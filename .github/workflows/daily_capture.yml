name: Ripley Daily Capture

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Chrome y Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth googleapis @aws-sdk/client-s3

      - name: Ejecutar Captura
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          MIS_COOKIES: ${{ secrets.MIS_COOKIES }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          export SHM_SIZE=2gb
          # El '|| true' evita que el workflow falle si el script lanza una excepción controlada
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node index.js || true