name: Ripley Daily Capture

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *' # Ejecución diaria

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar Captura Clonada
        # xvfb-run es OBLIGATORIO para que Puppeteer "dibuje" la página y resuelva
        # los retos de Cloudflare que viste en tus errores anteriores.
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          # Los dos Secrets clave que obtuviste en la oficina:
          MIS_COOKIES: ${{ secrets.MIS_COOKIES }}
          MI_LOCAL_STORAGE: ${{ secrets.MI_LOCAL_STORAGE }}
        run: |
          # Aumentamos la memoria compartida para evitar que Chrome se cierre en páginas pesadas como Ripley
          export SHM_SIZE=2gb
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node index.js