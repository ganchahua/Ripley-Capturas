name: Ripley Daily Capture (GCS Bridge)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *' # 8:00 AM hora Perú

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        # Instalamos el cliente de S3 para Node que es compatible con tu GCS
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth googleapis @aws-sdk/client-s3

      - name: Ejecutar Captura vía Puente Corporativo
        env:
          # Credenciales de Google Drive
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          
          # Cookies obtenidas de Brave en la oficina
          MIS_COOKIES: ${{ secrets.MIS_COOKIES }} #
          
          # Credenciales de S3 Browser (GCS)
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} #
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }} #
          AWS_BUCKET_NAME: "home.ripley.com.pe" #
          AWS_REGION: "auto"
        
        # Usamos xvfb-run para simular el monitor y evitar el bloqueo de Cloudflare
        run: |
          export SHM_SIZE=2gb
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node index.js