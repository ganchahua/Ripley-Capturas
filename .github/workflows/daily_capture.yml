name: Ripley Daily Capture

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install  # Solo instalará axios y googleapis

      - name: Ejecutar Captura vía Proxy API
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }} # <--- NUEVA VARIABLE
        run: node index.js