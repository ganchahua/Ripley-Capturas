name: Ripley Daily Capture

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *' # 8:00 AM hora Perú aprox.

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar Captura con Pantalla Virtual
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          MIS_COOKIES: ${{ secrets.MIS_COOKIES }} # <--- Tu JSON de la oficina
        run: xvfb-run --auto-servernum node index.js